<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./discover1.css" />
  </head>
  <body>
    <div class="discover-screen">
      <div class="discover-main-layout">
        <div class="disc-hero-image">
          <img src="./dis1-1.png" alt="Anime Character" />
          <div class="progress-bars">
            <span class="bar active"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>

        <div class="disc-middle-cover">
          <div class="daily-mix-card">
            <img src="./dis1-2.png" alt="Daily Mix 1" />
            <div class="card-label">Daily Mix 1</div>
          </div>
        </div>

        <div class="disc-right-info">
          <h1 class="mix-title">Linkin Park Mix</h1>
          <p class="mix-meta">By Spotify • 2023 • 22 songs • 1 hr 14 min</p>

          <div class="mix-controls">
            <button class="mix-play-btn">▶</button>
            <span class="icon">🔖 500K</span>
            <span class="icon">➕</span>
            <span class="icon">≡+</span>
            <span class="icon">📤</span>
            <span class="icon">...</span>
          </div>

          <div class="mix-tags">
            <span class="mix-tag">Rock</span>
            <span class="mix-tag">Alt Rock</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
