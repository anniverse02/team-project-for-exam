<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./discover2.css" />
  </head>
  <body>
    <div class="discover-player-page">
      <div class="content-wrapper">
        <div class="poster-column">
          <div class="vertical-poster">
            <img src="./dis2-1.png" alt="Lucky Poster" />
            <div class="poster-text-overlay">
              <p class="lucky-label">Lucky</p>
            </div>
            <div class="progress-bar-container">
              <span class="progress-bar-fill"></span>
            </div>
          </div>
        </div>

        <div class="info-column">
          <div class="song-card-layout">
            <img src="./dis2-2.png" alt="Get Lucky" class="album-cover" />

            <div class="song-main-info">
              <div class="title-row">
                <h1 class="song-name">Get Lucky</h1>
                <div class="action-icons-row">
                  <span class="icon-btn">💚</span>
                  <span class="icon-btn">🔀</span>
                  <span class="icon-btn">🔁</span>
                </div>
              </div>

              <p class="artist-list">
                Daft Punk, Pharrell Williams, Nile Rodgers
              </p>

              <div class="player-controls">
                <button class="main-play-circle">▶</button>
                <div class="extra-icons">
                  <span class="icon-btn">➕</span>
                  <span class="icon-btn">📤</span>
                  <span class="icon-btn">...</span>
                </div>
              </div>

              <div class="genre-tags">
                <span class="tag">Funk</span>
                <span class="tag">Disco</span>
                <span class="tag">Electronic</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
