<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">

      </aside>
      <div class="main-layout">
        <header class="top-header">

          
        </header>
      <main class="main-content">
        <div class="media-tab">
          <button class="media-button">Music</button>
          <button class="media-button">Podcasts</button>
          <button class="media-button">Audiobooks</button>
          <img src="css/assets/images/switch control.png" alt="switch-icon">
      </div>
      <section class="playlist">
        <div class="playlist-card">
          <img src="css/assets/images/daft punk.png" alt="daft punk">
          <div class="playlist-descr">
            <h3 class="song-title">Get Lucky</h3>
            <span class="artist-name">Daft Punk</span>
          </div>
        </div>
        <div class="playlist-card">
          <img src="css/assets/images/avril lavigne.png" alt="avril lavigne">
          <div class="playlist-descr">
            <h3 class="song-title">Daily Mix 2</h3>
          </div>
        </div>
        <div class="playlist-card">
          <img src="css/assets/images/linkin park.png" alt="linkin park">
          <div class="playlist-descr">
            <h3 class="song-title">Daily Mix 1</h3>
          </div>
        </div>
        <div class="playlist-card">
          <img src="css/assets/images/daft punk.png" alt="daft punk-2">
          <div class="playlist-descr">       
            <h3 class="song-title">Instant Crush</h3>
            <span class="artist-name">Daft Punk</span>
          </div>  
        </div>
        <div class="playlist-card">
          <img src="css/assets/images/daft punk.png" alt="daft punk-2">
          <div class="playlist-descr">
            <h3 class="song-title">Around the wo..</h3>
            <span class="artist-name">Daft Punk</span>
          </div>
        </div>
        <div class="playlist-card">
          <img src="css/assets/images/chili peppers.png" alt="chili peppers">
          <div class="playlist-descr">
          <h3 class="song-title">Rock mix</h3>
          </div>
        </div>
        </section>
      </div>


      </main>
      </div>
  </div>
  <footer class="bottom-player">

  </footer>
</body>
</html>
